<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Manaã</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0ece4;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
  font-family: -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
}

.phone-wrap {
  width: 300px;
  border-radius: 31px;
  overflow: hidden;
  box-shadow: 0 0 0 9px #1a1a1a, 0 28px 72px rgba(0,0,0,0.25), 0 4px 20px rgba(0,0,0,0.12);
  background: #075E54;
  display: flex;
  flex-direction: column;
}

/* Header */
.wa-header {
  background: #075E54;
  padding: 9px 12px;
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}
.wa-avatar {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #B8912E 0%, #D4B86A 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.wa-info { flex: 1; min-width: 0; }
.wa-name-row { display: flex; align-items: center; gap: 4px; }
.wa-name { color: #fff; font-size: 13.5px; font-weight: 600; line-height: 1.2; }
.wa-verified {
  width: 15px; height: 15px; flex-shrink: 0;
}
.wa-status { color: rgba(255,255,255,0.72); font-size: 10.5px; }

/* Chat */
.wa-chat {
  background: #e5ddd5;
  height: 430px;
  flex-shrink: 0;
  padding: 10px 8px 6px;
  display: flex; flex-direction: column; gap: 7px;
  overflow-y: scroll;
  position: relative;
  scroll-behavior: smooth;
}
.wa-chat::-webkit-scrollbar { display: none; }
.wa-chat { scrollbar-width: none; }

.wa-date { text-align: center; margin: 2px 0 6px; flex-shrink: 0; }
.wa-date span {
  background: rgba(255,255,255,0.88);
  color: #5a5a5a; font-size: 10.5px;
  padding: 2px 10px; border-radius: 7px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

/* Messages */
.msg {
  max-width: 85%; font-size: 12.5px; line-height: 1.45;
  border-radius: 8px; padding: 6px 9px 4px;
  position: relative; word-break: break-word;
  flex-shrink: 0;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.msg.show { opacity: 1; transform: translateY(0); }
.msg-in {
  background: #fff; align-self: flex-start;
  border-top-left-radius: 2px;
}
.msg-in::before {
  content: ''; position: absolute; left: -5px; top: 0;
  border-right: 5px solid #fff; border-top: 5px solid transparent;
}
.msg-out {
  background: #dcf8c6; align-self: flex-end;
  border-top-right-radius: 2px;
}
.msg-out::before {
  content: ''; position: absolute; right: -5px; top: 0;
  border-left: 5px solid #dcf8c6; border-top: 5px solid transparent;
}
.msg-time {
  font-size: 9.5px; color: rgba(0,0,0,0.38);
  float: right; margin: 2px 0 0 8px;
}
.msg-out .msg-time::after { content: ' ✓✓'; color: #4fc3f7; }

/* Template message */
.tpl-wrap {
  background: #fff;
  border-radius: 8px;
  border-top-left-radius: 2px;
  align-self: flex-start;
  max-width: 85%;
  overflow: hidden;
  flex-shrink: 0;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  position: relative;
}
.tpl-wrap::before {
  content: ''; position: absolute; left: -5px; top: 0;
  border-right: 5px solid #fff; border-top: 5px solid transparent;
  z-index: 1;
}
.tpl-wrap.show { opacity: 1; transform: translateY(0); }

.tpl-img {
  width: 100%; height: 240px;
  display: block; overflow: hidden; position: relative;
}
.tpl-img img {
  width: 100%; height: 100%; object-fit: cover; object-position: center 50%;
  display: block;
}
.tpl-img-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 8px 10px 6px;
}
.tpl-overlay-name { color: #fff; font-size: 11px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.6); }
.tpl-overlay-verse { color: rgba(255,255,255,0.9); font-size: 9.5px; line-height: 1.35; text-shadow: 0 1px 2px rgba(0,0,0,0.5); margin-top: 2px; }
.tpl-overlay-tag { color: rgba(255,255,255,0.5); font-size: 8px; text-align: right; margin-top: 3px; }

.tpl-body { padding: 6px 9px 2px; color: #1a1a1a; font-size: 12.5px; line-height: 1.45; }
.tpl-footer {
  padding: 1px 9px 6px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.tpl-sender { font-size: 10px; color: #888; }
.tpl-time { font-size: 9.5px; color: rgba(0,0,0,0.38); }

.tpl-divider { height: 1px; background: rgba(0,0,0,0.1); }
.tpl-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 9px;
  color: #009de2; font-size: 12.5px; font-weight: 400;
  cursor: pointer;
  opacity: 1;
  transition: background 0.15s;
  background: transparent;
  border: none; width: 100%;
}
.tpl-btn.show { opacity: 1; }
.tpl-btn:active, .tpl-btn.tapped { background: rgba(0,157,226,0.08); }
.tpl-btn svg { width: 14px; height: 14px; fill: #009de2; flex-shrink: 0; }

/* Quick reply tap = green outgoing bubble with quote */
.qr-tap {
  background: #dcf8c6; align-self: flex-end;
  border-radius: 8px; border-top-right-radius: 2px;
  max-width: 85%; padding: 0 0 4px;
  font-size: 12.5px; line-height: 1.45; position: relative;
  flex-shrink: 0; overflow: hidden;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.qr-tap::before {
  content: ''; position: absolute; right: -5px; top: 0;
  border-left: 5px solid #dcf8c6; border-top: 5px solid transparent;
}
.qr-tap.show { opacity: 1; transform: translateY(0); }
.qr-quote {
  background: rgba(0,0,0,0.07);
  border-left: 3px solid #25D366;
  padding: 5px 8px 5px 7px;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.qr-quote-thumb {
  width: 36px; height: 36px; border-radius: 3px; flex-shrink: 0;
  object-fit: cover;
}
.qr-quote-text { flex: 1; min-width: 0; }
.qr-quote-name { font-size: 10px; font-weight: 600; color: #075E54; }
.qr-quote-body { font-size: 10px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.qr-text { padding: 0 9px 2px; }


/* Audio message */
.audio-msg {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 9px;
}
.audio-play {
  width: 32px; height: 32px; border-radius: 50%;
  background: #128C7E; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.audio-play svg { width: 12px; height: 12px; fill: #fff; margin-left: 2px; }
.audio-wave {
  flex: 1; display: flex; align-items: center; gap: 2px; height: 24px;
}
.audio-wave span {
  display: inline-block; width: 3px; border-radius: 2px;
  background: #9e9e9e; animation: wave 1.2s ease-in-out infinite;
}
.audio-wave span:nth-child(1)  { height: 6px;  animation-delay: 0s; }
.audio-wave span:nth-child(2)  { height: 14px; animation-delay: 0.1s; }
.audio-wave span:nth-child(3)  { height: 20px; animation-delay: 0.2s; }
.audio-wave span:nth-child(4)  { height: 10px; animation-delay: 0.3s; }
.audio-wave span:nth-child(5)  { height: 18px; animation-delay: 0.15s; }
.audio-wave span:nth-child(6)  { height: 8px;  animation-delay: 0.25s; }
.audio-wave span:nth-child(7)  { height: 16px; animation-delay: 0.05s; }
.audio-wave span:nth-child(8)  { height: 12px; animation-delay: 0.35s; }
.audio-wave span:nth-child(9)  { height: 20px; animation-delay: 0.1s; }
.audio-wave span:nth-child(10) { height: 8px;  animation-delay: 0.2s; }
.audio-wave span:nth-child(11) { height: 14px; animation-delay: 0.3s; }
.audio-wave span:nth-child(12) { height: 6px;  animation-delay: 0s; }
@keyframes wave {
  0%, 100% { transform: scaleY(1); opacity: 0.5; }
  50% { transform: scaleY(1.6); opacity: 1; }
}
.audio-dur { font-size: 10px; color: rgba(0,0,0,0.4); white-space: nowrap; }

/* Typing */
.typing-wrap {
  display: flex; align-items: flex-start; flex-shrink: 0;
  opacity: 0; transform: translateY(6px);
  transition: opacity 0.25s, transform 0.25s;
}
.typing-wrap.show { opacity: 1; transform: translateY(0); }
.typing-bubble {
  background: #fff; border-radius: 8px; border-top-left-radius: 2px;
  padding: 9px 12px 8px;
  display: flex; gap: 3px; align-items: center;
  position: relative;
}
.typing-bubble::before {
  content: ''; position: absolute; left: -5px; top: 0;
  border-right: 5px solid #fff; border-top: 5px solid transparent;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #aaa; animation: bounce 1.1s infinite;
}
.dot:nth-child(2) { animation-delay: 0.15s; }
.dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* Input */
.wa-input {
  background: #f0f0f0; padding: 6px 8px;
  display: flex; align-items: center; gap: 7px;
  border-top: 1px solid #ddd;
  flex-shrink: 0;
}
.wa-input-field {
  flex: 1; background: #fff; border-radius: 20px;
  padding: 6px 12px; font-size: 12.5px; color: #999;
}
.wa-mic {
  width: 34px; height: 34px; background: #25D366; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.wa-mic svg { width: 16px; height: 16px; fill: #fff; }

.wa-badge {
  background: #e8e8e8; padding: 4px 0 7px;
  font-size: 10px; color: #888;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  flex-shrink: 0;
}
.badge-dot { width: 5px; height: 5px; background: #25D366; border-radius: 50%; }
</style>
</head>
<body>
<div class="phone-wrap">
  <div class="wa-header">
    <div class="wa-avatar">✨</div>
    <div class="wa-info">
      <div class="wa-name-row">
        <div class="wa-name">Manaã</div>
        <!-- WhatsApp Business verified badge -->
        <svg class="wa-verified" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 0L9.79 1.27L12 1.07L12.85 3.15L14.93 4L14.73 6.21L16 8L14.73 9.79L14.93 12L12.85 12.85L12 14.93L9.79 14.73L8 16L6.21 14.73L4 14.93L3.15 12.85L1.07 12L1.27 9.79L0 8L1.27 6.21L1.07 4L3.15 3.15L4 1.07L6.21 1.27L8 0Z" fill="#25D366"/>
          <path d="M5 8L7 10L11 6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="wa-status" id="wa-status">on-line</div>
    </div>
  </div>

  <div class="wa-chat" id="chat">
    <div class="wa-date"><span>hoje, 06:30</span></div>
  </div>

  <div class="wa-input">
    <div class="wa-input-field">Mensagem</div>
    <div class="wa-mic">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/>
        <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
      </svg>
    </div>
  </div>
  <div class="wa-badge"><div class="badge-dot"></div>Manaã · devocional diário</div>
</div>

<script>
const chat = document.getElementById('chat');
const status = document.getElementById('wa-status');

let _tMin = 30;
const T = () => { const t = `06:${String(_tMin).padStart(2,'0')}`; if (_tMin < 45) _tMin++; return t; };
function resetTime() { _tMin = 30; }

function addEl(el, delay) {
  return new Promise(res => {
    setTimeout(() => {
      chat.appendChild(el);
      chat.scrollTop = 9999;
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.classList.add('show');
      }));
      setTimeout(res, 380);
    }, delay);
  });
}

function msg(html, type) {
  const el = document.createElement('div');
  el.className = 'msg msg-' + type;
  el.innerHTML = html;
  return el;
}

function typing(delay) {
  return new Promise(res => {
    setTimeout(() => {
      status.textContent = 'digitando…';
      const w = document.createElement('div');
      w.className = 'typing-wrap'; w.id = 'typing';
      w.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
      chat.appendChild(w);
      chat.scrollTop = 9999;
      requestAnimationFrame(() => requestAnimationFrame(() => w.classList.add('show')));
      res(w);
    }, delay);
  });
}

function rmTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
  status.textContent = 'on-line';
}

async function run() {
  while (chat.children.length > 1) chat.removeChild(chat.lastChild);
  status.textContent = 'on-line';
  resetTime();

  // 1. Template matinal
  await typing(700);
  await new Promise(r => setTimeout(r, 1500));
  rmTyping();

  const tpl = document.createElement('div');
  tpl.className = 'tpl-wrap';
  tpl.innerHTML = `
    <div class="tpl-img">
      <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&q=75" alt="" loading="eager">
      <div class="tpl-img-overlay">
        <div class="tpl-overlay-name">Jacinta, lembre-se:</div>
        <div class="tpl-overlay-verse">"Planos de dar a vocês esperança e um futuro." (Jr 29:11)<br>Amém 🙏</div>
        <div class="tpl-overlay-tag">@manaaapp</div>
      </div>
    </div>
    <div class="tpl-body">
      Olá <strong>Jacinta</strong>, seu devocional assinado chegou:<br><br>
      "Porque eu sei os planos que tenho para vocês… planos de dar a vocês esperança e um futuro." (Jeremias 29:11). Que esta Palavra ilumine seu dia.<br><br>
      Amém
    </div>
    <div class="tpl-footer">
      <span class="tpl-sender">Manaã</span>
      <span class="tpl-time">${T()}</span>
    </div>
    <div class="tpl-divider"></div>
    <button class="tpl-btn" id="tpl-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/></svg>
      Conversar sobre a Palavra
    </button>
  `;
  await addEl(tpl, 0);
  document.getElementById('tpl-btn').classList.add('show');

  // 2. Usuário toca no botão
  await new Promise(r => setTimeout(r, 2200));
  const btn = document.getElementById('tpl-btn');
  if (btn) btn.classList.add('tapped');

  await new Promise(r => setTimeout(r, 300));
  const qr = document.createElement('div');
  qr.className = 'qr-tap';
  qr.innerHTML = `
    <div class="qr-quote">
      <img class="qr-quote-thumb" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=80&q=60" alt="">
      <div class="qr-quote-text">
        <div class="qr-quote-name">Manaã</div>
        <div class="qr-quote-body">📷 Olá Jacinta, seu devocional assinado chegou:</div>
      </div>
    </div>
    <div class="qr-text">Conversar sobre a Palavra<span class="msg-time">${T()}</span><span style="font-size:9.5px;color:#4fc3f7;margin-left:2px">✓✓</span></div>
  `;
  chat.appendChild(qr);
  chat.scrollTop = 9999;
  requestAnimationFrame(() => requestAnimationFrame(() => qr.classList.add('show')));
  await new Promise(r => setTimeout(r, 400));

  // 3. Bot sugere oração
  await typing(500);
  await new Promise(r => setTimeout(r, 1400));
  rmTyping();
  await addEl(msg(
    `Por quem você quer orar hoje? Me conta 🙏<span class="msg-time">${T()}</span>`,
    'in'
  ), 0);

  // 4. Usuário responde
  await addEl(msg(`Ora pela minha mãe Maria, ela tá doente<span class="msg-time">${T()}</span>`, 'out'), 1400);

  // 5. Bot manda áudio
  await typing(800);
  await new Promise(r => setTimeout(r, 2000));
  rmTyping();

  const audioMsg = msg(`
    <div class="audio-msg">
      <div class="audio-play">
        <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
      </div>
      <div class="audio-wave">
        <span></span><span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="audio-dur">0:28</div>
    </div>
    <span class="msg-time">${T()}</span>
  `, 'in');
  await addEl(audioMsg, 0);
  await new Promise(r => setTimeout(r, 600));
  await addEl(msg(`Amém 🙏<span class="msg-time">${T()}</span>`, 'in'), 0);

  // Aguarda o usuário clicar no play para ouvir a oração (MP3 real)
  await new Promise(res => {
    const playBtn = audioMsg.querySelector('.audio-play');
    if (!playBtn) { setTimeout(res, 5000); return; }
    playBtn.style.cursor = 'pointer';
    const audio = new Audio('./oracao.mp3');
    playBtn.onclick = () => {
      audio.currentTime = 0;
      audio.play().catch(() => {});
      audio.onended = () => setTimeout(res, 1200);
    };
  });

  run();
}

setTimeout(run, 600);
</script>
</body>
</html>
